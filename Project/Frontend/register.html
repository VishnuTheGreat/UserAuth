<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Secure Auth</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <h2>Create Account</h2>
    <p class="subtitle">Join us to experience secure authentication.</p>

    <div id="messageBox" class="msg"></div>

    <form id="registerForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
        </div>
        <div class="form-group">
            <label for="mobileNo">Mobile Number</label>
            <input type="text" id="mobileNo" required placeholder="+1234567890">
        </div>
        <div class="form-group">
            <label for="panNo">PAN Number</label>
            <input type="text" id="panNo" required placeholder="ABCDE1234F">
        </div>
        <button type="submit">Sign Up</button>
    </form>

    <div class="links">
        Already have an account? <a href="login.html">Log In</a>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8080'; // backend origin

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgBox = document.getElementById('messageBox');
        msgBox.className = 'msg';
        msgBox.textContent = 'Registering...';
        msgBox.style.display = 'block';

        const data = {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            dob: document.getElementById('dob').value,
            mobileNo: document.getElementById('mobileNo').value.trim(),
            panNo: document.getElementById('panNo').value.trim()
        };

        try {
            const response = await fetch(`${API_BASE_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                msgBox.className = 'msg success';
                let successHtml = (result.message || 'Registration successful.') + '<br><br>';
                if (result.secretImageUri) {
                    successHtml += '<img src="' + result.secretImageUri + '" alt="QR Code" style="margin-top: 15px; border-radius: 8px;"><br><br>';
                }
                successHtml += '<a href="login.html" style="color:var(--primary);text-decoration:underline;">Go to Log in</a>';
                msgBox.innerHTML = successHtml;
                document.getElementById('registerForm').reset();
            } else {
                msgBox.className = 'msg error';
                msgBox.textContent = result.message || 'Registration failed.';
            }
        } catch (err) {
            console.error(err);
            msgBox.className = 'msg error';
            msgBox.textContent = 'An error occurred during registration.';
        }
    });
</script>
</body>
</html>
